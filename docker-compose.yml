version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: kanji_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: kanji_master_secure_password_2026
      MYSQL_DATABASE: kanji_learning
    ports:
      - '3386:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: kanji_backend
    restart: always
    environment:
      PORT: 3686
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: kanji_master_secure_password_2026
      DB_NAME: kanji_learning
      JWT_SECRET: kanji_master_super_jwt_secret_key_2026
    ports:
      - '3686:3686'
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kanji_frontend
    restart: always
    ports:
      - '8686:8686'
    depends_on:
      - backend

volumes:
  mysql_data: