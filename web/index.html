<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Học Kanji N5 tiếng Nhật - 110 chữ, bộ thủ, ngữ pháp, ôn tập thông minh">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kanji Master">
  <meta name="theme-color" content="#E94560">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>Kanji Master</title>
  <style>
    body { background-color: #1A1A2E; margin: 0; }
    .loading-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; background-color: #1A1A2E; color: white; font-family: sans-serif;
    }
    .loading-screen h1 { font-size: 3rem; margin-bottom: 0.5rem; }
    .loading-screen p { color: #aaa; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #E94560; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-top: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading">
    <h1>Kanji Master</h1>
    <p>Đang tải...</p>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
